name: Quality Gate

on:
  push:
    branches: [main]
    # Only run when the site's Swift code changes — not on content/docs pushes
    # (blog posts, regenerated docs/). The daily schedule still collects telemetry.
    paths:
      - 'Sources/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/quality-gate.yml'
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  quality-gate:
    uses: jpurnell/quality-gate-swift/.github/workflows/quality-gate-reusable.yml@main
    with:
      checks: "all"
      continue-on-failure: true
      corpus-repo: jpurnell/org-judgement-corpus
    secrets:
      corpus-token: ${{ secrets.CORPUS_PUSH_TOKEN }}
